version: 0.2

phases:
  install:
    commands:
      - echo "✅ INSTALL PHASE"
      - npm install

  build:
    commands:
      - echo "✅ BUILD PHASE"
      - zip -r app.zip . -x "node_modules/*" ".git/*" "README.md" "template.yaml" "test.txt" "tet"

artifacts:
  files:
    - app.zip
  discard-paths: yes # 👈 makes app.zip the *root file* of the artifact
