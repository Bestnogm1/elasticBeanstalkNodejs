version: 0.2

phases:
  install:
    commands:
      - echo "✅ INSTALL PHASE"
      - npm install

  build:
    commands:
      - echo "✅ BUILD PHASE"
      - zip -r app.zip . -x "node_modules/*" ".git/*" "README.md" "template.yaml" "test.txt" "tet"
      - echo "🧪 Final contents of artifact:"
      - ls -l app.zip

artifacts:
  files:
    - app.zip
  discard-paths: yes
