version: 0.2

phases:
  install:
    commands:
      - echo "✅ INSTALL PHASE"
      - npm install

  build:
    commands:
      - echo "✅ BUILD PHASE"
      - cd $CODEBUILD_SRC_DIR
      - zip -r output.zip . -x ".git/*" "README.md" "template.yaml" "test.txt" "node_modules/*"
      - echo "🧪 Contents of current dir:"
      - ls
      - echo "📦 Verifying output.zip:"
      - unzip -l output.zip

artifacts:
  files:
    - output.zip
  discard-paths: yes
  base-directory: .
