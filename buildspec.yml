version: 0.2

phases:
  build:
    commands:
      - echo "✅ BUILD PHASE"
      - which zip || echo "zip not found"
      - zip -r output.zip . -x ".git/*" "README.md" "template.yaml" "test.txt" "node_modules/*"
      - echo "🧪 Contents of current dir:"
      - ls
      - echo "📦 Verifying output.zip:"
      - unzip -l output.zip

artifacts:
  base-directory: .
  files:
    - output.zip
